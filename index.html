<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#08090d">
  <meta name="color-scheme" content="dark">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VB predikciók">
  <meta name="description" content="VB 2026 Round of 32 predikciós PWA – magyar, offline, iPhone-ra optimalizált.">
  <title>VB 2026 predikciók</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png">
  <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <noscript>Az app használatához JavaScript szükséges.</noscript>
  <main class="phone-shell" id="appShell">
    <header class="app-header" aria-labelledby="appTitle">
      <div class="brand-row">
        <img class="brand-icon" src="./assets/icon.svg" width="40" height="40" alt="">
        <div>
          <p class="eyebrow">Round of 32</p>
          <h1 id="appTitle">VB 2026 predikciók</h1>
        </div>
      </div>
      <p class="subtitle">Következő 10 meccs – minimalista áttekintő</p>
      <div class="status-pill" id="loadStatus" aria-live="polite">Adatok betöltése…</div>
    </header>

    <section class="view is-active" id="matchesView" aria-label="Meccsek">
      <section class="summary-strip" id="summaryStrip" aria-label="Rövid összefoglaló">
        <div class="summary-skeleton"></div>
        <div class="summary-skeleton short"></div>
      </section>

      <section class="section-head">
        <div>
          <h2>Meccsek</h2>
          <p>Időrendben, egyenrangú kártyákkal.</p>
        </div>
      </section>

      <section class="match-list" id="matchList" aria-live="polite">
        <article class="match-card skeleton-card"></article>
        <article class="match-card skeleton-card"></article>
        <article class="match-card skeleton-card"></article>
      </section>

      <section class="method-card" id="methodCard" hidden>
        <button class="method-toggle" type="button" id="methodToggle" aria-expanded="false">
          <span>Módszer</span>
          <span class="chevron" aria-hidden="true">⌄</span>
        </button>
        <div class="method-content" id="methodContent" hidden></div>
      </section>
    </section>

    <section class="view" id="riskView" aria-label="Kockázat">
      <section class="section-head risk-head">
        <div>
          <p class="eyebrow">Áttekintés</p>
          <h2>Kockázat</h2>
          <p>Hosszabbítás, büntetők, váratlan kimenetel és alacsonyabb bizalom.</p>
        </div>
      </section>
      <div class="risk-grid" id="riskGrid"></div>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="Alsó navigáció">
    <button class="nav-button is-active" type="button" data-view="matches" aria-current="page">
      <span class="nav-dot" aria-hidden="true"></span>
      <span>Meccsek</span>
    </button>
    <button class="nav-button" type="button" data-view="risk">
      <span class="nav-dot" aria-hidden="true"></span>
      <span>Kockázat</span>
    </button>
  </nav>

  <div class="sheet-overlay" id="sheetOverlay" hidden></div>
  <aside class="bottom-sheet" id="matchSheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle" hidden>
    <div class="sheet-handle" aria-hidden="true"></div>
    <button class="sheet-close" id="sheetClose" type="button" aria-label="Részletes nézet bezárása">×</button>
    <div class="sheet-content" id="sheetContent" tabindex="-1"></div>
  </aside>

  <script src="./app.js" defer></script>
</body>
</html>
